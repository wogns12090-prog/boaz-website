<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="dataSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#012B2F"/>
      <stop offset="45%" stop-color="#01535C"/>
      <stop offset="100%" stop-color="#013F44"/>
    </linearGradient>
    <radialGradient id="horizonGlow" cx="50%" cy="62%" r="50%">
      <stop offset="0%" stop-color="#89E3E9" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#89E3E9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#dataSky)"/>
  <rect width="1920" height="1080" fill="url(#horizonGlow)"/>

  <!-- 청정 하늘: 얇은 구름 밴드 -->
  <g fill="#FFFFFF" opacity="0.05">
    <ellipse cx="380" cy="180" rx="240" ry="26"/>
    <ellipse cx="1550" cy="130" rx="280" ry="22"/>
    <ellipse cx="960" cy="90" rx="200" ry="18"/>
  </g>

  <!-- 지평선 -->
  <rect x="0" y="760" width="1920" height="4" fill="#7CE0E6" opacity="0.25"/>

  <!-- IoT / AI 네트워크 노드 -->
  <g stroke="#7CE0E6" stroke-opacity="0.35" stroke-width="1.5">
    <path d="M300 300 L520 420 L760 260 L980 400 L1220 240 L1460 380 L1680 260"/>
    <path d="M520 420 L620 620 M980 400 L900 640 M1220 240 L1300 480 M1460 380 L1560 600"/>
    <path d="M300 300 L260 520 M1680 260 L1740 500"/>
  </g>
  <g fill="#BDEFF2">
    <circle cx="300" cy="300" r="6" opacity="0.9"/>
    <circle cx="520" cy="420" r="9" opacity="0.95"/>
    <circle cx="760" cy="260" r="5" opacity="0.8"/>
    <circle cx="980" cy="400" r="10" opacity="1"/>
    <circle cx="1220" cy="240" r="6" opacity="0.85"/>
    <circle cx="1460" cy="380" r="8" opacity="0.9"/>
    <circle cx="1680" cy="260" r="5" opacity="0.8"/>
    <circle cx="620" cy="620" r="4" opacity="0.7"/>
    <circle cx="900" cy="640" r="4" opacity="0.7"/>
    <circle cx="1300" cy="480" r="5" opacity="0.75"/>
    <circle cx="1560" cy="600" r="4" opacity="0.7"/>
    <circle cx="260" cy="520" r="4" opacity="0.7"/>
    <circle cx="1740" cy="500" r="4" opacity="0.7"/>
  </g>

  <!-- 중앙 강조 노드(허브) -->
  <g transform="translate(980,400)">
    <circle r="34" fill="none" stroke="#DFFBFC" stroke-opacity="0.5" stroke-width="2"/>
    <circle r="56" fill="none" stroke="#DFFBFC" stroke-opacity="0.25" stroke-width="1.5"/>
  </g>

  <!-- 데이터 상승 바(지속가능성 지표) -->
  <g fill="#0A5A63" opacity="0.9">
    <rect x="760" y="880" width="60" height="120"/>
    <rect x="850" y="840" width="60" height="160"/>
    <rect x="940" y="800" width="60" height="200"/>
    <rect x="1030" y="760" width="60" height="240"/>
    <rect x="1120" y="820" width="60" height="180"/>
  </g>
  <g fill="#7CE0E6" opacity="0.9">
    <rect x="760" y="880" width="60" height="10"/>
    <rect x="850" y="840" width="60" height="10"/>
    <rect x="940" y="800" width="60" height="10"/>
    <rect x="1030" y="760" width="60" height="10"/>
    <rect x="1120" y="820" width="60" height="10"/>
  </g>

  <!-- 새싹/지속가능성 아이콘 (단순 라인) -->
  <g transform="translate(1420,860)" stroke="#DFFBFC" stroke-opacity="0.7" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M0 120 V40"/>
    <path d="M0 70 C -40 60 -50 20 -40 -10 C -10 -10 10 30 0 70 Z"/>
    <path d="M0 90 C 30 84 44 54 36 30 C 12 30 -4 60 0 90 Z"/>
  </g>

  <!-- 하단 마감 -->
  <rect x="0" y="960" width="1920" height="120" fill="#001417" opacity="0.5"/>
</svg>

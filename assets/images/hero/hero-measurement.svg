<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#013F44"/>
      <stop offset="55%" stop-color="#01535C"/>
      <stop offset="100%" stop-color="#012B2F"/>
    </linearGradient>
    <linearGradient id="stackBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A5A63"/>
      <stop offset="100%" stop-color="#023238"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#4DBDC4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4DBDC4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#012225"/>
      <stop offset="100%" stop-color="#001417"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- 측정 격자 (그래프 라인) -->
  <g stroke="#4DBDC4" stroke-opacity="0.09" stroke-width="1">
    <path d="M0 120 H1920 M0 260 H1920 M0 400 H1920 M0 540 H1920 M0 680 H1920"/>
    <path d="M160 0 V1080 M480 0 V1080 M800 0 V1080 M1120 0 V1080 M1440 0 V1080 M1760 0 V1080"/>
  </g>

  <!-- 배경 산업단지 실루엣 (원경) -->
  <g fill="#012B2F" opacity="0.75">
    <rect x="0" y="640" width="90" height="180"/>
    <rect x="110" y="600" width="60" height="220"/>
    <rect x="1780" y="610" width="70" height="210"/>
    <rect x="1680" y="660" width="90" height="160"/>
    <rect x="1500" y="690" width="60" height="130"/>
  </g>

  <!-- 굴뚝(측정 대상) 근경 실루엣 -->
  <g>
    <rect x="860" y="330" width="200" height="500" fill="url(#stackBody)"/>
    <rect x="860" y="330" width="200" height="18" fill="#0F6870"/>
    <rect x="900" y="230" width="120" height="110" fill="url(#stackBody)"/>
    <rect x="900" y="230" width="120" height="14" fill="#0F6870"/>
    <!-- 배출 연기(연한 궤적) -->
    <g fill="#DCEFF1" opacity="0.16">
      <ellipse cx="960" cy="190" rx="70" ry="34"/>
      <ellipse cx="1030" cy="150" rx="90" ry="40"/>
      <ellipse cx="1120" cy="110" rx="110" ry="46"/>
    </g>
  </g>

  <!-- 측정 지점 표시 (펄스 링) -->
  <g transform="translate(1010,300)">
    <circle r="46" fill="none" stroke="#7CE0E6" stroke-opacity="0.55" stroke-width="2"/>
    <circle r="26" fill="none" stroke="#7CE0E6" stroke-opacity="0.8" stroke-width="2"/>
    <circle r="6" fill="#B7F0F3"/>
  </g>

  <!-- 시료채취 장비 실루엣(단순화된 콘솔) -->
  <g transform="translate(1180,760)" opacity="0.92">
    <rect x="0" y="0" width="170" height="110" rx="8" fill="#08484F"/>
    <rect x="14" y="16" width="60" height="34" rx="4" fill="#0F6870"/>
    <circle cx="130" cy="34" r="18" fill="none" stroke="#7CE0E6" stroke-width="3"/>
    <rect x="14" y="64" width="142" height="8" rx="4" fill="#0A5A63"/>
    <rect x="14" y="80" width="100" height="8" rx="4" fill="#0A5A63"/>
  </g>

  <!-- 데이터 라인 그래프 (신뢰도 강조) -->
  <polyline points="1210,900 1260,860 1310,880 1360,830 1410,850 1460,800" fill="none" stroke="#9FE8EC" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 하단 지면 -->
  <rect x="0" y="900" width="1920" height="180" fill="url(#ground)"/>

  <!-- 좌측 여백 계측 눈금(장식) -->
  <g stroke="#7CE0E6" stroke-opacity="0.3" stroke-width="2">
    <path d="M120 400 h18 M120 440 h30 M120 480 h18 M120 520 h30 M120 560 h18"/>
  </g>
</svg>
